<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>

<body class="bg-slate-900 text-slate-200 p-4">
    <main class="max-w-3xl mx-auto">
        <div class="bg-indigo-600 text-white mb-5 w-8 h-8 rounded-full flex items-center justify-center">01</div>
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5 mb-6">
            <h3 class="font-bold text-white uppercase text-xs">Git y GitHub</h3>
            <div class="bg-black/60 p-4 rounded font-mono text-emerald-400 text-xs border-l-4 border-indigo-500 mt-4">
                mkdir proyecto-git <br>
                cd proyecto-git <br>
                git init <br>
            </div>
        </div>
        <div class="bg-indigo-600 text-white mb-5 w-8 h-8 rounded-full flex items-center justify-center">02</div>
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-5 mb-6">
            <h3 class="font-bold text-white uppercase text-xs">Primer Commit Local</h3>
            <div class="bg-black/60 p-4 rounded font-mono text-emerald-400 text-xs border-l-4 border-indigo-500 mt-4">
                git add .<br>
                git commit -m "Primer commit"<br>
            </div>
        </div>
    </main>

</body>

</html>
